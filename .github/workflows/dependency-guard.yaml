name: Dependency Guard

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  dependency-guard:
    name: pruned yq dependency graph
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Check forbidden dependencies
        run: |
          module_re='^[A-Za-z0-9_.-]+(/[A-Za-z0-9_.-]+)+'
          module_re+='([[:space:]]+v[0-9][^[:space:]]*)?$'
          modules="$(make deps | grep -E "$module_re")"
          printf '%s\n' "$modules"
          forbidden='github.com/goccy/go-yaml'
          forbidden+='|github.com/hashicorp/hcl'
          forbidden+='|github.com/zclconf/go-cty'
          forbidden+='|github.com/pelletier/go-toml'
          forbidden+='|github.com/yuin/gopher-lua'
          forbidden+='|github.com/go-ini/ini'
          forbidden+='|github.com/magiconair/properties'
          if printf '%s\n' "$modules" | grep -E "$forbidden"; then
            echo "Forbidden dependency found in module graph" >&2
            exit 1
          fi
