name: Examples

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  examples:
    name: example smoke tests
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Run examples
        run: |
          make -C examples clean
          make -C examples run
          make -C examples clean
