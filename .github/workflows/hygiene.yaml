name: Hygiene

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  hygiene:
    name: formatting and tidy
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Check formatting
        run: |
          make fmt
          git diff --exit-code

      - name: Check go.mod and go.sum
        run: |
          make tidy
          git diff --exit-code go.mod go.sum
